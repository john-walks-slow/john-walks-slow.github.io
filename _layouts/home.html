<!-- Page Header -->
{% include intro-header.html type='page' %}

<!-- Main Content -->
<div class="container">
  <div class="row">
    <!-- USE SIDEBAR -->
    <!-- PostList Container -->
    <div class="col-lg-4 col-md-4 col-sm-12 col-xs-12 postlist-container">
      {% include short-about.html %}
      <!-- Friends Blog -->
      <!-- {% include friends.html %} -->
    </div>
    <!-- Sidebar Container -->
    <div class="col-lg-8 col-lg-offset-0 col-md-8 col-md-offset-0 col-sm-12 col-xs-12">
      <hr />
      <h5>RECENT</h5>
      {% include posts.html %} {% include pager.html %}
      <h6>
        <a style="color: #aaaaaa;" href="{{'/archive/' | prepend: site.baseurl }}"
          >> 按标签检索文章</a
        >
      </h6>
    </div>
  </div>

  {% if site.page-mathjax %}
  <!-- Add support for Mathjax by Voleking-->
  <!-- If you want to see formulars well in post preview, Maybe you should add this.-->
  <!-- However, most of the time formulars may not appear in the post preview, you can delete it.-->
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      TeX: {
        equationNumbers: {
          autoNumber: "AMS"
        }
      },
      tex2jax: {
        inlineMath: [ ['$','$'] ],
        displayMath: [ ['$$','$$'] ],
        processEscapes: true,
      }
    });
  </script>
  <script
    type="text/javascript"
    src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS-MML_HTMLorMML"
  ></script>
  {% endif %}
</div>
<!-- Footer -->
<footer>

      <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1">

        <h5 class="copyright">
          找我玩 ↑
