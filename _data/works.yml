《Record 2020~2018》DIY磁带:
  url: 'https://streetvoice.cn/john_walks_slow/songs/album/97315178/'
  type: 'link'
  description: 
    '拖着不想做的手工录音带，收集了三年里的16首蹩脚录音。</br>
    大部分曲目是在没人的地方（关门的餐厅、楼道、阳台或者漆黑的广场）偷偷录的。它们来自没有冲动的沉闷空气，用三根手指能按住的和弦固执地凝固成声音，现在又回到沉闷。今年六月，一时兴起下，我买了一台150元的熊猫牌录放机把它们灌录成这盒录音带。我们都想要更好的，糟糕的歌留在了这。'
  img: 'record.jpg'
  date: 2020 / 07
