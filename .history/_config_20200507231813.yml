# Site settings
title: 小齐慢慢前进! | John Walks Slow
SEOTitle: 小齐慢慢前进! | John Walks Slow
header-img: img/home-bg.jpg
email: huxpro@gmail.com
description: '小齐的博客里什么都没有'
keyword: '小齐, 一倍速小齐, JohnnRen, 小齐的博客, John Walks Slow, 博客, 个人网站'
url: 'https://john-walks-slow.github.io/' # your host, for absolute URL
baseurl: '' # for example, '/blog' if your blog hosted on 'host/blog'

# Publish posts or collection documents with a future date.
future: true

# SNS settings
RSS: false
weibo_username: JohnnRen
zhihu_username: JohnnRen
github_username: john-walks-slow
twitter_username: JohnnRen
facebook_username: yan_qi_ren
#linkedin_username:  firstname-lastname-idxxxx

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude: ['less', 'node_modules', 'Gruntfile.js', 'package.json', 'README.md', 'README.zh.md']
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
#timezone: CN

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
disqus_username: john-walks-slow

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics
ga_track_id: 'UA-49627206-1' # Format: UA-xxxxxx-xx
ga_domain: github.io

# Sidebar settings
sidebar: true # whether or not using Sidebar.
sidebar-about-description: '小齐有问题'
sidebar-avatar: /img/avatar.jpg # use absolute URL, seeing it's used in both `/` and `/about/`

# Featured Tags
featured-tags: true # whether or not using Feature-Tags
featured-condition-size: 0 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: '#000000'
service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

# Friends
friends: []

defaults:
  - scope:
      path: '玩电脑'
      type: 'posts'
    values:
      layout: post
      author: '小齐'
      header-img: 'img/home-bg.jpg'
      tags:
        - 玩电脑
  - scope:
      path: '玩音乐'
      type: 'posts'
    values:
      layout: post
      author: '小齐'
      header-img: 'img/home-bg.jpg'
      tags:
        - 玩音乐
  - scope:
      path: '想事情'
      type: 'posts'
    values:
      layout: post
      author: '小齐'
      header-img: 'img/home-bg.jpg'
      tags:
        - 想事情
